apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  namespace: bookstore-ns
  labels:
    app: crm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
    spec:
      containers:
        - name: crm-service
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/bookstore/crm-service:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKERS
              value: "98.88.99.206:9092,34.195.107.7:9092,54.221.160.63:9092"
            - name: KAFKA_TOPIC
              value: vdodia.customer.evt
            - name: AWS_REGION
              value: us-east-1
            - name: SES_SENDER
              value: SES_SENDER_EMAIL
            - name: ANDREW_ID
              value: vdodia
